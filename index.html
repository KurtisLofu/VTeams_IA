<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VTeams</title>
    <style>
        :root {
            --campo-naranja: #e67e22;
            --campo-azul: #1abc9c;
            --red-line: #2c3e50;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #000;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }
        
        /* Panel de Configuración Ocultable */
        .config-panel {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: #1e272e;
            color: white;
            padding: 15px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            transition: transform 0.3s ease;
            max-height: 85vh;
            overflow-y: auto;
        }
        .config-panel.collapsed {
            transform: translateY(-100%);
        }
        .toggle-config-btn {
            position: fixed;
            top: 10px; right: 10px;
            z-index: 101;
            background: rgba(0,0,0,0.6);
            color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;
        }

        .flex-input { display: flex; gap: 6px; margin-top: 15px; margin-bottom: 10px; }
        .flex-input input { 
            flex: 2; padding: 10px; border: 1px solid #485460; 
            border-radius: 8px; background: #2f3542; color: white; font-size: 1rem;
        }
        .flex-input select {
            flex: 1; padding: 10px; border: 1px solid #485460;
            border-radius: 8px; background: #2f3542; color: white; font-size: 0.9rem;
        }
        .config-panel button {
            background-color: #3498db; color: white; border: none;
            padding: 10px 14px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        
        .player-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px; max-height: 180px; overflow-y: auto; margin-top: 10px;
            border-top: 1px solid #3d4d5c; padding-top: 10px;
        }
        .player-item {
            display: flex; align-items: center; justify-content: space-between;
            background: #2f3542; padding: 6px 8px; border-radius: 6px; font-size: 0.85rem;
        }
        .player-item.selected { background: #2ecc71; color: white; }
        .player-item span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .player-item select { background: #1e272e; color: white; border: none; font-size: 0.75rem; padding: 2px; border-radius: 4px; margin-right: 4px; }
        .btn-del { background: none !important; color: #ff3f34; border: none; font-size: 1.2rem; padding: 0 4px; }
        .controls-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .controls-row select { padding: 8px; border-radius: 6px; background: #2f3542; color: white; border: 1px solid #485460; }

        /* PISTA COMPLETA (FULL SCREEN) */
        .court {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
        }
        
        /* Campo Naranja (Arriba) */
        .side.naranja {
            background-color: var(--campo-naranja);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 40px 10px 20px 10px;
            position: relative;
        }
        
        /* Línea de la Red */
        .net-line {
            height: 4px;
            background-color: var(--red-line);
            width: 100%;
            z-index: 10;
        }
        
        /* Campo Azul/Turquesa (Abajo) */
        .side.azul {
            background-color: var(--campo-azul);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 20px 10px 80px 10px;
            position: relative;
        }

        .court-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            text-align: center;
        }

        /* Jugadores minimalistas flotantes */
        .court-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 65px;
            font-size: 1.45rem; 
            font-weight: 700;
            color: #000000;
            transition: opacity 0.2s, transform 0.2s;
            cursor: pointer;
            position: relative;
        }
        .court-player .role-badge {
            font-size: 0.75rem;
            font-weight: 800;
            background: rgba(0,0,0,0.15);
            padding: 1px 5px;
            border-radius: 4px;
            margin-top: 2px;
        }
        /* Listo para intercambiar (Click 1) */
        .court-player.ready-to-swap {
            opacity: 0.6;
            color: #2c3e50;
        }
        /* Bloqueado (Long Click) */
        .court-player.locked {
            font-style: italic;
        }
        .empty-slot { min-height: 65px; }

        /* Icono de Pelota de Saque */
        .ball {
            font-size: 32px; position: absolute; cursor: pointer;
            z-index: 20; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .side.naranja .ball { top: 20px; right: 20px; }
        .side.azul .ball { top: 20px; right: 20px; }
        .hidden { display: none !important; }

        /* BOTÓN REROLL FLOTANTE ESTILO ANDROID */
        .btn-reroll-container {
            position: fixed;
            bottom: 25px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            z-index: 50;
            pointer-events: none;
        }
        .btn-floating-reroll {
            background: rgba(87, 101, 116, 0.85); 
            color: #ffffff;
            border: 2px solid rgba(255,255,255,0.15);
            padding: 14px 45px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-floating-reroll:active {
            transform: scale(0.96);
            background: rgba(47, 53, 66, 0.95);
        }

        /* Vista Multiequipo (3+) */
        .multi-teams {
            padding: 60px 15px 20px 15px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px; height: 100vh; overflow-y: auto; background: #111;
        }
        .team-card {
            background: #1e272e; border-radius: 12px; padding: 15px; border: 1px solid #2f3542; color: white; height: fit-content;
        }
        .team-card h3 { color: #f59e0b; margin: 0 0 10px 0; }
        .multi-player-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #2f3542; padding: 10px; border-radius: 8px; margin-bottom: 6px; font-weight: bold;
        }
        .multi-player-row select { padding: 4px; background: #1e272e; color: white; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- Botón flotante para abrir/cerrar ajustes de jugadores -->
    <button class="toggle-config-btn" onclick="toggleConfigPanel()">Jugadores ⚙️</button>

    <!-- Panel de Configuración -->
    <div class="config-panel" id="config-panel">
        <h2>Configurar Partido</h2>
        <div class="flex-input">
            <input type="text" id="player-name" placeholder="Nombre del jugador..." onkeypress="if(event.key === 'Enter') addPlayer()">
            <select id="player-role">
                <option value="colocador">Colocador (C)</option>
                <option value="opuesto">Opuesto (O)</option>
                <option value="central">Central (X)</option>
                <option value="punta" selected>Punta (P)</option>
                <option value="libero">Líbero (L)</option>
            </select>
            <button onclick="addPlayer()">Añadir</button>
        </div>
        <div class="controls-row">
            <label>Modo de juego:</label>
            <select id="num-teams" onchange="renderTeams()">
                <option value="2">2 Equipos (Pista Equilibrada)</option>
                <option value="3">3 Equipos</option>
                <option value="4">4 Equipos</option>
                <option value="5">5 Equipos</option>
                <option value="6">6 Equipos</option>
            </select>
            <button style="background-color: #2ecc71;" onclick="generateTeams(); toggleConfigPanel();">Listo 🎮</button>
        </div>
        <div class="player-list" id="players-container"></div>
    </div>

    <!-- PISTA VERTICAL ESTILO ANDROID -->
    <div id="court-view" class="court">
        <div class="side naranja" id="side-naranja">
            <div id="ball-naranja" class="ball" onclick="setServer('azul')">🏐</div>
            <div class="court-row" id="naranja-defensa"></div>
            <div class="court-row" id="naranja-ataque"></div>
        </div>
        
        <div class="net-line"></div>
        
        <div class="side azul" id="side-azul">
            <div id="ball-azul" class="ball hidden" onclick="setServer('naranja')">🏐</div>
            <div class="court-row" id="azul-ataque"></div>
            <div class="court-row" id="azul-defensa"></div>
        </div>
    </div>

    <div id="multi-view" class="multi-teams hidden"></div>

    <!-- BOTÓN REROLL FLOTANTE -->
    <div class="btn-reroll-container">
        <button class="btn-floating-reroll" onclick="rerollTeams()">
            Reroll 🎲
        </button>
    </div>

<script>
    let players = JSON.parse(localStorage.getItem('voley_players')) || [];
    let currentTeams = []; 
    let lockedPlayers = new Set(); 
    let selectedPlayerToSwap = null; 

    const roleLabels = {
        colocador: 'C',
        opuesto: 'O',
        central: 'X',
        punta: 'P',
        libero: 'L'
    };

    function saveStorage() { localStorage.setItem('voley_players', JSON.stringify(players)); }

    function toggleConfigPanel() {
        document.getElementById('config-panel').classList.toggle('collapsed');
    }

    function renderPlayerList() {
        const container = document.getElementById('players-container');
        container.innerHTML = '';
        players.forEach(p => {
            // Asegurar que viejos perfiles guarden un rol base por defecto
            if(!p.role) p.role = 'punta';

            const div = document.createElement('div');
            div.className = `player-item ${p.selected ? 'selected' : ''}`;
            
            div.innerHTML = `
                <span onclick="toggleSelectPlayer('${p.id}')">${p.name}</span>
                <select onchange="updatePlayerRole('${p.id}', this.value)">
                    <option value="colocador" ${p.role === 'colocador' ? 'selected' : ''}>C</option>
                    <option value="opuesto" ${p.role === 'opuesto' ? 'selected' : ''}>O</option>
                    <option value="central" ${p.role === 'central' ? 'selected' : ''}>X</option>
                    <option value="punta" ${p.role === 'punta' ? 'selected' : ''}>P</option>
                    <option value="libero" ${p.role === 'libero' ? 'selected' : ''}>L</option>
                </select>
                <button class="btn-del" onclick="deletePlayer('${p.id}')">&times;</button>
            `;
            container.appendChild(div);
        });
    }

    function addPlayer() {
        const input = document.getElementById('player-name');
        const roleSelect = document.getElementById('player-role');
        const name = input.value.trim();
        if(!name) return;
        
        players.push({ 
            id: Date.now().toString(), 
            name: name, 
            selected: true, 
            role: roleSelect.value 
        });
        
        input.value = ''; 
        saveStorage(); 
        renderPlayerList();
    }

    function updatePlayerRole(id, newRole) {
        const p = players.find(p => p.id === id);
        if(p) { p.role = newRole; saveStorage(); }
    }

    function deletePlayer(id) {
        players = players.filter(p => p.id !== id);
        lockedPlayers.delete(id);
        saveStorage(); renderPlayerList();
    }

    function toggleSelectPlayer(id) {
        const p = players.find(p => p.id === id);
        if(p) { p.selected = !p.selected; if(!p.selected) lockedPlayers.delete(id); saveStorage(); renderPlayerList(); }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function randomBallAssignment() {
        const randomTeam = Math.random() < 0.5 ? 'azul' : 'naranja';
        setServer(randomTeam);
    }

    // ALGORITMO INTEGRADO DE REPARTO EQUITATIVO DE POSICIONES
    function generateTeams() {
        const numTeams = parseInt(document.getElementById('num-teams').value);
        const selected = players.filter(p => p.selected);
        
        if(selected.length < numTeams) { alert(`Mínimo ${numTeams} jugadores seleccionados.`); return; }

        currentTeams = Array.from({length: numTeams}, () => []);
        lockedPlayers.clear(); 
        selectedPlayerToSwap = null;

        // Si son 2 equipos, aplicamos balance estratégico estricto por roles
        if (numTeams === 2) {
            let colocadores = shuffle(selected.filter(p => p.role === 'colocador'));
            let opuestos = shuffle(selected.filter(p => p.role === 'opuesto'));
            let liberos = shuffle(selected.filter(p => p.role === 'libero'));
            let demas = shuffle(selected.filter(p => p.role !== 'colocador' && p.role !== 'opuesto' && p.role !== 'libero'));

            // Repartir roles clave alternadamente
            colocadores.forEach((p, idx) => currentTeams[idx % 2].push(p.id));
            opuestos.forEach((p, idx) => currentTeams[(idx + 1) % 2].push(p.id)); // Offset para no sobrecargar
            liberos.forEach((p, idx) => currentTeams[idx % 2].push(p.id));

            // Rellenar equitativamente con centrales y puntas sobrantes
            demas.forEach(p => {
                if(currentTeams[0].length <= currentTeams[1].length) currentTeams[0].push(p.id);
                else currentTeams[1].push(p.id);
            });
        } else {
            // Reparto normal aleatorio estándar para 3+ equipos
            const shuffledIds = shuffle(selected.map(p => p.id));
            shuffledIds.forEach((id, index) => { currentTeams[index % numTeams].push(id); });
        }

        randomBallAssignment();
        renderTeams();
    }

    function rerollTeams() {
        if(currentTeams.length === 0) return generateTeams();
        const numTeams = currentTeams.length;
        const selectedPlayers = players.filter(p => p.selected).map(p => p.id);
        
        let lockedByTeam = Array.from({length: numTeams}, () => []);
        let freePlayers = [];

        selectedPlayers.forEach(id => {
            if(lockedPlayers.has(id)) {
                const currentTeamIdx = currentTeams.findIndex(t => t.includes(id));
                if(currentTeamIdx !== -1) lockedByTeam[currentTeamIdx].push(id);
                else freePlayers.push(id);
            } else { freePlayers.push(id); }
        });

        shuffle(freePlayers);
        let newTeams = lockedByTeam.map(t => [...t]);

        while(freePlayers.length > 0) {
            const id = freePlayers.pop();
            let minTeamIdx = 0, minSize = Infinity;
            for(let i=0; i < numTeams; i++) {
                if(newTeams[i].length < minSize) { minSize = newTeams[i].length; minTeamIdx = i; }
            }
            newTeams[minTeamIdx].push(id);
        }

        currentTeams = newTeams;
        selectedPlayerToSwap = null;
        randomBallAssignment();
        renderTeams();
    }

    function executeSwap(id1, id2) {
        let teamIdx1 = currentTeams.findIndex(t => t.includes(id1));
        let teamIdx2 = currentTeams.findIndex(t => t.includes(id2));
        
        let pIdx1 = currentTeams[teamIdx1].indexOf(id1);
        let pIdx2 = currentTeams[teamIdx2].indexOf(id2);
        
        currentTeams[teamIdx1][pIdx1] = id2;
        currentTeams[teamIdx2][pIdx2] = id1;
        
        selectedPlayerToSwap = null;
        renderTeams();
    }

    function toggleLock(id) {
        if(lockedPlayers.has(id)) lockedPlayers.delete(id);
        else lockedPlayers.add(id);
        renderTeams();
    }

    function setServer(team) {
        if(team === 'azul') {
            document.getElementById('ball-azul').classList.remove('hidden');
            document.getElementById('ball-naranja').classList.add('hidden');
        } else {
            document.getElementById('ball-azul').classList.add('hidden');
            document.getElementById('ball-naranja').classList.remove('hidden');
        }
    }

    function renderTeams() {
        const numTeams = parseInt(document.getElementById('num-teams').value);
        
        if(numTeams === 2) {
            document.getElementById('court-view').classList.remove('hidden');
            document.getElementById('multi-view').classList.add('hidden');
            if(currentTeams.length === 2) {
                renderCourtSide(0, 'naranja'); 
                renderCourtSide(1, 'azul');    
            }
        } else {
            document.getElementById('court-view').classList.add('hidden');
            document.getElementById('multi-view').classList.remove('hidden');
            renderMultiTeams();
        }
    }

    function attachAppLogicEvents(element, id) {
        let pressTimer;
        let isLongPress = false;

        const startPress = () => {
            isLongPress = false;
            pressTimer = setTimeout(() => {
                isLongPress = true;
                toggleLock(id); 
            }, 500); 
        };

        const endPress = (e) => { clearTimeout(pressTimer); };
        const handleCancel = () => { clearTimeout(pressTimer); };

        const handleClick = (e) => {
            if (isLongPress) return; 

            if (selectedPlayerToSwap === null) {
                selectedPlayerToSwap = id;
                renderTeams();
            } else if (selectedPlayerToSwap === id) {
                selectedPlayerToSwap = null;
                renderTeams();
            } else {
                executeSwap(selectedPlayerToSwap, id);
            }
        };

        element.addEventListener('touchstart', startPress, {passive: true});
        element.addEventListener('touchend', endPress, {passive: true});
        element.addEventListener('touchmove', handleCancel, {passive: true});
        element.addEventListener('mousedown', startPress);
        element.addEventListener('mouseup', endPress);
        element.addEventListener('mouseleave', handleCancel);
        element.addEventListener('click', handleClick);
    }

    function renderCourtSide(teamIdx, colorName) {
        const ataqueContainer = document.getElementById(`${colorName}-ataque`);
        const defensaContainer = document.getElementById(`${colorName}-defensa`);
        ataqueContainer.innerHTML = ''; defensaContainer.innerHTML = '';
        
        const teamPlayerIds = currentTeams[teamIdx] || [];
        
        for (let i = 0; i < 6; i++) {
            const id = teamPlayerIds[i];
            const cell = document.createElement('div');

            if (id) {
                const p = players.find(player => player.id === id);
                
                let classes = 'court-player';
                if (lockedPlayers.has(id)) classes += ' locked';
                if (selectedPlayerToSwap === id) classes += ' ready-to-swap';
                
                cell.className = classes;
                
                // Formar el contenido del bloque agregando indicadores dinámicos (🔄 o 🔒) pedidos
                let displayName = p.name;
                if (lockedPlayers.has(id)) displayName = '🔒 ' + displayName;
                if (selectedPlayerToSwap === id) displayName += ' 🔄';

                cell.innerHTML = `
                    <div>${displayName}</div>
                    <div class="role-badge">${roleLabels[p.role || 'punta']}</div>
                `;
                
                attachAppLogicEvents(cell, id);
            } else {
                cell.className = 'empty-slot';
            }

            if (i < 3) ataqueContainer.appendChild(cell);
            else defensaContainer.appendChild(cell);
        }

        // Suplentes adicionales
        if (teamPlayerIds.length > 6) {
            teamPlayerIds.slice(6).forEach(id => {
                const p = players.find(player => player.id === id);
                const cell = document.createElement('div');
                
                let classes = 'court-player';
                if (lockedPlayers.has(id)) classes += ' locked';
                if (selectedPlayerToSwap === id) classes += ' ready-to-swap';
                
                cell.className = classes;
                cell.style.fontSize = '1.1rem';
                
                let displayName = p.name;
                if (lockedPlayers.has(id)) displayName = '🔒 ' + displayName;
                if (selectedPlayerToSwap === id) displayName += ' 🔄';

                cell.innerHTML = `
                    <div>${displayName} <span style="font-size:0.7rem; opacity:0.6;"><br>(Sup)</span></div>
                    <div class="role-badge">${roleLabels[p.role || 'punta']}</div>
                `;
                
                attachAppLogicEvents(cell, id);
                
                if(colorName === 'naranja') defensaContainer.insertAdjacentElement('afterbegin', cell);
                else defensaContainer.insertAdjacentElement('beforeend', cell);
            });
        }
    }

    function renderMultiTeams() {
        const container = document.getElementById('multi-view');
        container.innerHTML = '';
        if(currentTeams.length <= 2) return;

        currentTeams.forEach((team, teamIdx) => {
            const card = document.createElement('div');
            card.className = `team-card t-${teamIdx}`;
            card.innerHTML = `<h3>Equipo ${teamIdx + 1} (${team.length})</h3>`;

            const ul = document.createElement('div');
            team.forEach(id => {
                const p = players.find(player => player.id === id);
                if(!p) return;

                let moveOptions = '';
                for(let i=0; i<currentTeams.length; i++) {
                    if(i !== teamIdx) moveOptions += `<option value="${i}">A Equipo ${i+1}</option>`;
                }

                const item = document.createElement('div');
                item.className = 'multi-player-row';
                item.innerHTML = `
                    <span>${p.name} [${roleLabels[p.role || 'punta']}] ${lockedPlayers.has(id) ? '🔒' : ''}</span>
                    <div style="display:flex; gap: 8px;">
                        <button style="padding:4px 8px; font-size:0.8rem;" class="${lockedPlayers.has(id) ? 'btn-del' : ''}" onclick="toggleLock('${id}')">🔒</button>
                        <select onchange="movePlayer('${id}', ${teamIdx}, parseInt(this.value))">
                            <option value="" disabled selected>Mover</option>
                            ${moveOptions}
                        </select>
                    </div>
                `;
                ul.appendChild(item);
            });
            card.appendChild(ul);
            container.appendChild(card);
        });
    }

    renderPlayerList();
</script>
</body>
</html>
