<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vóley Táctico Minimalista</title>
    <style>
        :root {
            --campo-naranja: #e67e22;
            --campo-azul: #1abc9c;
            --red-line: #2c3e50;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #000;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }
        
        /* Panel de Configuración Ocultable */
        .config-panel {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: #1e272e;
            color: white;
            padding: 15px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            transition: transform 0.3s ease;
            max-height: 80vh;
            overflow-y: auto;
        }
        .config-panel.collapsed {
            transform: translateY(-100%);
        }
        .toggle-config-btn {
            position: fixed;
            top: 10px; right: 10px;
            z-index: 101;
            background: rgba(0,0,0,0.6);
            color: white; border: 1px solid rgba(255,255,255,0.3);
            padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;
        }

        .flex-input { display: flex; gap: 8px; margin-top: 15px; margin-bottom: 10px; }
        .flex-input input { 
            flex: 1; padding: 10px; border: 1px solid #485460; 
            border-radius: 8px; background: #2f3542; color: white; font-size: 1rem;
        }
        .config-panel button {
            background-color: #3498db; color: white; border: none;
            padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        
        .player-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px; max-height: 150px; overflow-y: auto; margin-top: 10px;
        }
        .player-item {
            display: flex; align-items: center; justify-content: space-between;
            background: #2f3542; padding: 8px; border-radius: 6px; font-size: 0.9rem;
        }
        .player-item.selected { background: #2ecc71; color: white; }
        .player-item span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-del { background: none !important; color: #ff3f34; border: none; font-size: 1.2rem; padding: 0 4px; }
        .controls-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        .controls-row select { padding: 8px; border-radius: 6px; background: #2f3542; color: white; border: 1px solid #485460; }

        /* PISTA COMPLETA (FULL SCREEN) */
        .court {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
        }
        
        /* Campo Naranja (Arriba) */
        .side.naranja {
            background-color: var(--campo-naranja);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 40px 10px 20px 10px;
            position: relative;
        }
        
        /* Red de separación divisoria */
        .net-line {
            height: 4px;
            background-color: var(--red-line);
            width: 100%;
            z-index: 10;
        }
        
        /* Campo Azul/Turquesa (Abajo) */
        .side.azul {
            background-color: var(--campo-azul);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 20px 10px 80px 10px;
            position: relative;
        }

        /* Distribución de filas tácticas */
        .court-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            text-align: center;
        }

        /* Jugadores minimalistas (solo texto flotante como en la imagen) */
        .court-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            font-size: 1.45rem; /* Letra grande e importante */
            font-weight: 700;
            color: #000000;
            transition: opacity 0.2s;
        }
        /* Estado bloqueado sutil */
        .court-player.locked {
            opacity: 0.5;
            font-style: italic;
        }
        .empty-slot { min-height: 60px; }

        /* Icono de Pelota de Saque interactiva */
        .ball {
            font-size: 32px; position: absolute; cursor: pointer;
            z-index: 20; width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        /* Posiciones exactas del balón según tu imagen */
        .side.naranja .ball { top: 20px; right: 20px; }
        .side.azul .ball { top: 20px; right: 20px; }
        .hidden { display: none !important; }

        /* BOTÓN REROLL FLOTANTE ESTILO ANDROID */
        .btn-reroll-container {
            position: fixed;
            bottom: 25px;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            z-index: 50;
            pointer-events: none; /* Deja pasar clicks alrededor */
        }
        .btn-floating-reroll {
            background: rgba(87, 101, 116, 0.85); /* Gris oscuro traslúcido */
            color: #ffffff;
            border: 2px solid rgba(255,255,255,0.15);
            padding: 14px 45px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            pointer-events: auto; /* Activa clicks solo en el botón */
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-floating-reroll:active {
            transform: scale(0.96);
            background: rgba(47, 53, 66, 0.95);
        }

        /* Vista Multiequipo alternativa (3+) adaptada al modo oscuro */
        .multi-teams {
            padding: 60px 15px 20px 15px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px; height: 100vh; overflow-y: auto; background: #111;
        }
        .team-card {
            background: #1e272e; border-radius: 12px; padding: 15px; border: 1px solid #2f3542; color: white; height: fit-content;
        }
        .team-card h3 { color: #f59e0b; margin: 0 0 10px 0; }
        .multi-player-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #2f3542; padding: 10px; border-radius: 8px; margin-bottom: 6px; font-weight: bold;
        }
        .multi-player-row select { padding: 4px; background: #1e272e; color: white; border-radius: 4px; }
    </style>
</head>
<body>

    <button class="toggle-config-btn" onclick="toggleConfigPanel()">Jugadores ⚙️</button>

    <div class="config-panel" id="config-panel">
        <h2>Configurar Partido</h2>
        <div class="flex-input">
            <input type="text" id="player-name" placeholder="Nombre del jugador..." onkeypress="if(event.key === 'Enter') addPlayer()">
            <button onclick="addPlayer()">Añadir</button>
        </div>
        <div class="controls-row">
            <label>Modo de juego:</label>
            <select id="num-teams" onchange="renderTeams()">
                <option value="2">2 Equipos (Pista Android Fullscreen)</option>
                <option value="3">3 Equipos</option>
                <option value="4">4 Equipos</option>
                <option value="5">5 Equipos</option>
                <option value="6">6 Equipos</option>
            </select>
            <button style="background-color: #2ecc71;" onclick="generateTeams(); toggleConfigPanel();">Listo 🎮</button>
        </div>
        <div class="player-list" id="players-container"></div>
    </div>

    <div id="court-view" class="court">
        <div class="side naranja" id="side-naranja">
            <div id="ball-naranja" class="ball" onclick="setServer('azul')">🏐</div>
            <div class="court-row" id="naranja-defensa"></div>
            <div class="court-row" id="naranja-ataque"></div>
        </div>
        
        <div class="net-line"></div>
        
        <div class="side azul" id="side-azul">
            <div id="ball-azul" class="ball hidden" onclick="setServer('naranja')">🏐</div>
            <div class="court-row" id="azul-ataque"></div>
            <div class="court-row" id="azul-defensa"></div>
        </div>
    </div>

    <div id="multi-view" class="multi-teams hidden"></div>

    <div class="btn-reroll-container">
        <button class="btn-floating-reroll" onclick="rerollTeams()">
            Reroll 🎲
        </button>
    </div>

<script>
    let players = JSON.parse(localStorage.getItem('voley_players')) || [];
    let currentTeams = []; 
    let lockedPlayers = new Set(); 

    function saveStorage() { localStorage.setItem('voley_players', JSON.stringify(players)); }

    function toggleConfigPanel() {
        document.getElementById('config-panel').classList.toggle('collapsed');
    }

    function renderPlayerList() {
        const container = document.getElementById('players-container');
        container.innerHTML = '';
        players.forEach(p => {
            const div = document.createElement('div');
            div.className = `player-item ${p.selected ? 'selected' : ''}`;
            div.innerHTML = `<span onclick="toggleSelectPlayer('${p.id}')">${p.name}</span>
                             <button class="btn-del" onclick="deletePlayer('${p.id}')">&times;</button>`;
            container.appendChild(div);
        });
    }

    function addPlayer() {
        const input = document.getElementById('player-name');
        const name = input.value.trim();
        if(!name) return;
        players.push({ id: Date.now().toString(), name: name, selected: true });
        input.value = ''; saveStorage(); renderPlayerList();
    }

    function deletePlayer(id) {
        players = players.filter(p => p.id !== id);
        lockedPlayers.delete(id);
        saveStorage(); renderPlayerList();
    }

    function toggleSelectPlayer(id) {
        const p = players.find(p => p.id === id);
        if(p) { p.selected = !p.selected; if(!p.selected) lockedPlayers.delete(id); saveStorage(); renderPlayerList(); }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function randomBallAssignment() {
        const randomTeam = Math.random() < 0.5 ? 'azul' : 'naranja';
        setServer(randomTeam);
    }

    function generateTeams() {
        const numTeams = parseInt(document.getElementById('num-teams').value);
        const selectedPlayers = players.filter(p => p.selected).map(p => p.id);
        
        if(selectedPlayers.length < numTeams) { alert(`Mínimo ${numTeams} jugadores seleccionados.`); return; }

        currentTeams = Array.from({length: numTeams}, () => []);
        lockedPlayers.clear(); 

        const shuffledIds = shuffle([...selectedPlayers]);
        shuffledIds.forEach((id, index) => { currentTeams[index % numTeams].push(id); });

        randomBallAssignment();
        renderTeams();
    }

    function rerollTeams() {
        if(currentTeams.length === 0) return generateTeams();
        const numTeams = currentTeams.length;
        const selectedPlayers = players.filter(p => p.selected).map(p => p.id);
        
        let lockedByTeam = Array.from({length: numTeams}, () => []);
        let freePlayers = [];

        selectedPlayers.forEach(id => {
            if(lockedPlayers.has(id)) {
                const currentTeamIdx = currentTeams.findIndex(t => t.includes(id));
                if(currentTeamIdx !== -1) lockedByTeam[currentTeamIdx].push(id);
                else freePlayers.push(id);
            } else { freePlayers.push(id); }
        });

        shuffle(freePlayers);
        let newTeams = lockedByTeam.map(t => [...t]);

        while(freePlayers.length > 0) {
            const id = freePlayers.pop();
            let minTeamIdx = 0, minSize = Infinity;
            for(let i=0; i < numTeams; i++) {
                if(newTeams[i].length < minSize) { minSize = newTeams[i].length; minTeamIdx = i; }
            }
            newTeams[minTeamIdx].push(id);
        }

        currentTeams = newTeams;
        randomBallAssignment();
        renderTeams();
    }

    function movePlayer(id, fromTeamIdx, toTeamIdx) {
        currentTeams[fromTeamIdx] = currentTeams[fromTeamIdx].filter(pId => pId !== id);
        currentTeams[toTeamIdx].push(id);
        renderTeams();
    }

    function toggleLock(id) {
        if(lockedPlayers.has(id)) lockedPlayers.delete(id);
        else lockedPlayers.add(id);
        renderTeams();
    }

    function setServer(team) {
        if(team === 'azul') {
            document.getElementById('ball-azul').classList.remove('hidden');
            document.getElementById('ball-naranja').classList.add('hidden');
        } else {
            document.getElementById('ball-azul').classList.add('hidden');
            document.getElementById('ball-naranja').classList.remove('hidden');
        }
    }

    function renderTeams() {
        const numTeams = parseInt(document.getElementById('num-teams').value);
        
        if(numTeams === 2) {
            document.getElementById('court-view').classList.remove('hidden');
            document.getElementById('multi-view').classList.add('hidden');
            if(currentTeams.length === 2) {
                renderCourtSide(0, 'naranja', 1); // Equipo 1 arriba (Naranja)
                renderCourtSide(1, 'azul', 0);    // Equipo 2 abajo (Azul)
            }
        } else {
            document.getElementById('court-view').classList.add('hidden');
            document.getElementById('multi-view').classList.remove('hidden');
            renderMultiTeams();
        }
    }

    // Configura eventos táctiles especiales (Toque Largo para mover, Doble toque para bloquear)
    function attachTouchEvents(element, id, currentTeamIdx, targetTeamIdx) {
        let touchTimer;
        let lastTap = 0;

        // Soporte tanto para móvil (touch) como PC (mouse)
        const startEvent = () => {
            touchTimer = setTimeout(() => {
                movePlayer(id, currentTeamIdx, targetTeamIdx);
            }, 500); // 0.5 segundos manteniendo pulsado para cambiar de campo
        };

        const endEvent = (e) => {
            clearTimeout(touchTimer);
        };

        const clickEvent = (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 250 && tapLength > 0) {
                // Doble click/tap rápido detectado -> Bloquear jugador
                toggleLock(id);
                e.preventDefault();
            }
            lastTap = currentTime;
        };

        element.addEventListener('touchstart', startEvent, {passive: true});
        element.addEventListener('touchend', endEvent, {passive: true});
        element.addEventListener('mousedown', startEvent);
        element.addEventListener('mouseup', endEvent);
        element.addEventListener('click', clickEvent);
    }

    function renderCourtSide(teamIdx, colorName, opponentIdx) {
        const ataqueContainer = document.getElementById(`${colorName}-ataque`);
        const defensaContainer = document.getElementById(`${colorName}-defensa`);
        ataqueContainer.innerHTML = ''; defensaContainer.innerHTML = '';
        
        const teamPlayerIds = currentTeams[teamIdx] || [];
        
        for (let i = 0; i < 6; i++) {
            const id = teamPlayerIds[i];
            const cell = document.createElement('div');

            if (id) {
                const p = players.find(player => player.id === id);
                cell.className = `court-player ${lockedPlayers.has(id) ? 'locked' : ''}`;
                cell.textContent = p.name;
                
                // Adjuntar los gestos invisibles
                attachTouchEvents(cell, id, teamIdx, opponentIdx);
            } else {
                cell.className = 'empty-slot';
            }

            if (i < 3) ataqueContainer.appendChild(cell);
            else defensaContainer.appendChild(cell);
        }

        // Suplentes adicionales acoplados de forma gigante flotando detrás
        if (teamPlayerIds.length > 6) {
            teamPlayerIds.slice(6).forEach(id => {
                const p = players.find(player => player.id === id);
                const cell = document.createElement('div');
                cell.className = `court-player ${lockedPlayers.has(id) ? 'locked' : ''}`;
                cell.style.fontSize = '1.1rem';
                cell.innerHTML = `${p.name} <span style="font-size:0.7rem; opacity:0.6;"><br>(Sup)</span>`;
                
                attachTouchEvents(cell, id, teamIdx, opponentIdx);
                
                if(colorName === 'naranja') defensaContainer.insertAdjacentElement('afterbegin', cell);
                else defensaContainer.insertAdjacentElement('beforeend', cell);
            });
        }
    }

    function renderMultiTeams() {
        const container = document.getElementById('multi-view');
        container.innerHTML = '';
        if(currentTeams.length <= 2) return;

        currentTeams.forEach((team, teamIdx) => {
            const card = document.createElement('div');
            card.className = `team-card t-${teamIdx}`;
            card.innerHTML = `<h3>Equipo ${teamIdx + 1} (${team.length})</h3>`;

            const ul = document.createElement('div');
            team.forEach(id => {
                const p = players.find(player => player.id === id);
                if(!p) return;

                let moveOptions = '';
                for(let i=0; i<currentTeams.length; i++) {
                    if(i !== teamIdx) moveOptions += `<option value="${i}">A Equipo ${i+1}</option>`;
                }

                const item = document.createElement('div');
                item.className = 'multi-player-row';
                item.innerHTML = `
                    <span>${p.name} ${lockedPlayers.has(id) ? '🔒' : ''}</span>
                    <div style="display:flex; gap: 8px;">
                        <button style="padding:4px 8px; font-size:0.8rem;" class="${lockedPlayers.has(id) ? 'btn-del' : ''}" onclick="toggleLock('${id}')">🔒</button>
                        <select onchange="movePlayer('${id}', ${teamIdx}, parseInt(this.value))">
                            <option value="" disabled selected>Mover</option>
                            ${moveOptions}
                        </select>
                    </div>
                `;
                ul.appendChild(item);
            });
            card.appendChild(ul);
            container.appendChild(card);
        });
    }

    // Inicialización de la lista
    renderPlayerList();
</script>
</body>
</html>
