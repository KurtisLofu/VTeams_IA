<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vóley裝 Móvil Táctico</title>
    <style>
        :root {
            --azul: #1e40af;
            --naranja: #c2410c;
            --azul-light: #3b82f6;
            --naranja-light: #f97316;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 8px;
            background-color: #111827;
            color: #f3f4f6;
        }
        h1, h2, h3 { text-align: center; margin: 8px 0; font-weight: 800; }
        h1 { font-size: 1.4rem; color: #f59e0b; }
        
        .container { max-width: 100%; margin: 0 auto; }
        
        .card {
            background: #1f2937;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #374151;
        }
        
        /* Configuración de jugadores */
        .flex-input { display: flex; gap: 8px; margin-bottom: 10px; }
        .flex-input input { 
            flex: 1; padding: 12px; border: 1px solid #4b5563; 
            border-radius: 8px; background: #374151; color: white; font-size: 1rem;
        }
        button {
            background-color: #3b82f6; color: white; border: none;
            padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem;
        }
        
        .player-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            max-height: 140px;
            overflow-y: auto;
            padding: 4px;
        }
        .player-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #374151;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .player-item.selected { background: #065f46; border: 1px solid #10b981; }
        .player-item span { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-del { background: none; color: #ef4444; border: none; font-size: 1.2rem; padding: 0 4px; }

        /* Controles de Generación */
        .controls { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; }
        select { padding: 10px; border-radius: 8px; background: #374151; color: white; border: 1px solid #4b5563; font-size: 1rem; }
        .btn-gen { background-color: #10b981; }
        .btn-reroll { background-color: #d97706; }

        /* PISTA VERTICAL ENORME */
        .court {
            display: flex;
            flex-direction: column;
            background-color: #ca8a04; 
            padding: 10px;
            border-radius: 14px;
            margin-top: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            width: 100%;
            min-height: calc(100vh - 340px); 
        }
        
        .side {
            flex: 1;
            padding: 8px;
            position: relative;
            border: 3px solid white;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        
        .side.azul { background-color: var(--azul); border-bottom: none; border-radius: 8px 8px 0 0; }
        .side.naranja { background-color: var(--naranja); border-top: none; border-radius: 0 0 8px 8px; }
        
        /* Red Horizontal en el medio */
        .net {
            background: #4b5563;
            color: #fff;
            height: 10px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
            letter-spacing: 4px;
            z-index: 10;
            border-left: 3px solid white;
            border-right: 3px solid white;
        }

        /* Filas de 3 Jugadores */
        .court-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
        }

        /* Fichas de Jugador GIGANTES */
        .court-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.18);
            border: 2px solid rgba(255, 255, 255, 0.4);
            padding: 12px 4px;
            border-radius: 10px;
            min-height: 85px;
            position: relative;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
        }
        .court-player .name {
            font-size: 1.15rem; 
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            word-break: break-all;
            text-align: center;
            margin-bottom: 8px;
        }
        .court-player .actions { display: flex; gap: 8px; width: 100%; justify-content: center; }
        .court-player button { 
            padding: 6px 10px; 
            font-size: 1rem; 
            background: rgba(0,0,0,0.6); 
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
        }
        .court-player button.active-lock { background: #dc2626; border-color: #ef4444; }

        .empty-slot {
            border: 2px dashed rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.15);
            border-radius: 10px;
            min-height: 85px;
        }

        /* Pelota de Saque Flotante */
        .ball {
            font-size: 28px; position: absolute; cursor: pointer;
            animation: bounce 0.4s infinite alternate; z-index: 15;
            background: white; border-radius: 50%; width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        .side.azul .ball { top: 10px; left: 10px; }
        .side.naranja .ball { bottom: 10px; right: 10px; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Vista Multiequipo (3+) */
        .multi-teams {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px; margin-top: 10px;
        }
        .team-card {
            background: #1f2937; border-radius: 12px; padding: 14px;
            border-top: 6px solid #cbd5e1; border: 1px solid #374151;
        }
        .team-card h3 { color: white; margin-bottom: 12px; font-size: 1.2rem; }
        .team-card.t-0 { border-top: 6px solid var(--azul-light); }
        .team-card.t-1 { border-top: 6px solid var(--naranja-light); }
        .team-card.t-2 { border-top: 6px solid #10b981; }
        .team-card.t-3 { border-top: 6px solid #8b5cf6; }
        .team-card.t-4 { border-top: 6px solid #ec4899; }
        .team-card.t-5 { border-top: 6px solid #06b6d4; }
        
        .multi-player-row {
            display: flex; justify-content: space-between; align-items: center;
            background: #374151; padding: 10px; border-radius: 8px; margin-bottom: 6px;
            font-size: 1.1rem; font-weight: bold;
        }
        .multi-player-row select { padding: 4px; font-size: 0.9rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏐 VÓLEY TEAM RANDOMIZER</h1>

    <!-- Panel de Gestión -->
    <div class="card">
        <div class="flex-input">
            <input type="text" id="player-name" placeholder="Nombre del jugador..." onkeypress="if(event.key === 'Enter') addPlayer()">
            <button onclick="addPlayer()">Añadir</button>
        </div>
        <div class="player-list" id="players-container"></div>
    </div>

    <!-- Panel de Mandos -->
    <div class="card controls">
        <select id="num-teams">
            <option value="2">2 Equipos (Pista Vertical)</option>
            <option value="3">3 Equipos</option>
            <option value="4">4 Equipos</option>
            <option value="5">5 Equipos</option>
            <option value="6">6 Equipos</option>
        </select>
        <button class="btn-gen" onclick="generateTeams()">Generar</button>
        <button class="btn-reroll" onclick="rerollTeams()">Reroll 🔁</button>
    </div>

    <!-- PISTA VERTICAL (2 Equipos) -->
    <div id="court-view" class="court hidden">
        <!-- Campo Azul (Arriba) -->
        <div class="side azul" id="side-azul">
            <div id="ball-azul" class="ball" onclick="setServer('naranja')">🏐</div>
            <div class="court-row" id="azul-defensa"></div>
            <div class="court-row" id="azul-ataque"></div>
        </div>
        
        <!-- Red Central -->
        <div class="net">RED</div>
        
        <!-- Campo Naranja (Abajo) -->
        <div class="side naranja" id="side-naranja">
            <div id="ball-naranja" class="ball hidden" onclick="setServer('azul')">🏐</div>
            <div class="court-row" id="naranja-ataque"></div>
            <div class="court-row" id="naranja-defensa"></div>
        </div>
    </div>

    <!-- MULTIEQUIPOS (3+ Equipos) -->
    <div id="multi-view" class="multi-teams hidden"></div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('voley_players')) || [];
    let currentTeams = []; 
    let lockedPlayers = new Set(); 

    function saveStorage() { localStorage.setItem('voley_players', JSON.stringify(players)); }

    function renderPlayerList() {
        const container = document.getElementById('players-container');
        container.innerHTML = '';
        players.forEach(p => {
            const div = document.createElement('div');
            div.className = `player-item ${p.selected ? 'selected' : ''}`;
            div.innerHTML = `<span onclick="toggleSelectPlayer('${p.id}')">${p.name}</span>
                             <button class="btn-del" onclick="deletePlayer('${p.id}')">&times;</button>`;
            container.appendChild(div);
        });
    }

    function addPlayer() {
        const input = document.getElementById('player-name');
        const name = input.value.trim();
        if(!name) return;
        players.push({ id: Date.now().toString(), name: name, selected: true });
        input.value = ''; saveStorage(); renderPlayerList();
    }

    function deletePlayer(id) {
        players = players.filter(p => p.id !== id);
        lockedPlayers.delete(id);
        saveStorage(); renderPlayerList();
    }

    function toggleSelectPlayer(id) {
        const p = players.find(p => p.id === id);
        if(p) { p.selected = !p.selected; if(!p.selected) lockedPlayers.delete(id); saveStorage(); renderPlayerList(); }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function randomBallAssignment() {
        const randomTeam = Math.random() < 0.5 ? 'azul' : 'naranja';
        setServer(randomTeam);
    }

    function generateTeams() {
        const numTeams = parseInt(document.getElementById('num-teams').value);
        const selectedPlayers = players.filter(p => p.selected).map(p => p.id);
        
        if(selectedPlayers.length < numTeams) { alert(`Mínimo ${numTeams} jugadores seleccionados.`); return; }

        currentTeams = Array.from({length: numTeams}, () => []);
        lockedPlayers.clear(); 

        const shuffledIds = shuffle([...selectedPlayers]);
        shuffledIds.forEach((id, index) => { currentTeams[index % numTeams].push(id); });

        randomBallAssignment();
        renderTeams();
    }

    function rerollTeams() {
        if(currentTeams.length === 0) return generateTeams();
        const numTeams = currentTeams.length;
        const selectedPlayers = players.filter(p => p.selected).map(p => p.id);
        
        let lockedByTeam = Array.from({length: numTeams}, () => []);
        let freePlayers = [];

        selectedPlayers.forEach(id => {
            if(lockedPlayers.has(id)) {
                const currentTeamIdx = currentTeams.findIndex(t => t.includes(id));
                if(currentTeamIdx !== -1) lockedByTeam[currentTeamIdx].push(id);
                else freePlayers.push(id);
            } else { freePlayers.push(id); }
        });

        shuffle(freePlayers);
        let newTeams = lockedByTeam.map(t => [...t]);

        while(freePlayers.length > 0) {
            const id = freePlayers.pop();
            let minTeamIdx = 0, minSize = Infinity;
            for(let i=0; i < numTeams; i++) {
                if(newTeams[i].length < minSize) { minSize = newTeams[i].length; minTeamIdx = i; }
            }
            newTeams[minTeamIdx].push(id);
        }

        currentTeams = newTeams;
        randomBallAssignment();
        renderTeams();
    }

    function movePlayer(id, fromTeamIdx, toTeamIdx) {
        currentTeams[fromTeamIdx] = currentTeams[fromTeamIdx].filter(pId => pId !== id);
        currentTeams[toTeamIdx].push(id);
        renderTeams();
    }

    function toggleLock(id) {
        if(lockedPlayers.has(id)) lockedPlayers.delete(id);
        else lockedPlayers.add(id);
        renderTeams();
    }

    function setServer(team) {
        if(team === 'azul') {
            document.getElementById('ball-azul').classList.remove('hidden');
            document.getElementById('ball-naranja').classList.add('hidden');
        } else {
            document.getElementById('ball-azul').classList.add('hidden');
            document.getElementById('ball-naranja').classList.remove('hidden');
        }
    }

    // Corregido: Fuerza a las vistas a actualizarse al renderizar los equipos
    function updateViewVisibility() {
        const numTeams = currentTeams.length;
        if(numTeams === 2) {
            document.getElementById('court-view').classList.remove('hidden');
            document.getElementById('multi-view').classList.add('hidden');
        } else {
            document.getElementById('court-view').classList.add('hidden');
            document.getElementById('multi-view').classList.remove('hidden');
        }
    }

    function renderTeams() {
        if (currentTeams.length === 0) return;
        
        updateViewVisibility();

        if (currentTeams.length === 2) {
            renderCourtSide(0, 'azul');
            renderCourtSide(1, 'naranja');
        } else {
            renderMultiTeams();
        }
    }

    function renderCourtSide(teamIdx, colorName) {
        const ataqueContainer = document.getElementById(`${colorName}-ataque`);
        const defensaContainer = document.getElementById(`${colorName}-defensa`);
        ataqueContainer.innerHTML = ''; defensaContainer.innerHTML = '';
        
        const teamPlayerIds = currentTeams[teamIdx] || [];
        
        for (let i = 0; i < 6; i++) {
            const id = teamPlayerIds[i];
            let slotHTML = '';

            if (id) {
                const p = players.find(player => player.id === id);
                const arrow = colorName === 'azul' ? '⬇️' : '⬆️';
                
                slotHTML = `
                    <div class="court-player">
                        <div class="name">${p.name}</div>
                        <div class="actions">
                            <button class="${lockedPlayers.has(id) ? 'active-lock' : ''}" onclick="toggleLock('${id}')">🔒</button>
                            <button onclick="movePlayer('${id}', ${teamIdx}, ${teamIdx === 0 ? 1 : 0})">${arrow}</button>
                        </div>
                    </div>
                `;
            } else {
                slotHTML = `<div class="empty-slot"></div>`;
            }

            if (i < 3) ataqueContainer.insertAdjacentHTML('beforeend', slotHTML);
            else defensaContainer.insertAdjacentHTML('beforeend', slotHTML);
        }

        if (teamPlayerIds.length > 6) {
            teamPlayerIds.slice(6).forEach(id => {
                const p = players.find(player => player.id === id);
                const arrow = colorName === 'azul' ? '⬇️' : '⬆️';
                const extraHTML = `
                    <div class="court-player" style="background: rgba(0,0,0,0.35);">
                        <div class="name">${p.name} <span style="font-size:0.8rem;color:#ccc;"><br>(Sup)</span></div>
                        <div class="actions">
                            <button class="${lockedPlayers.has(id) ? 'active-lock' : ''}" onclick="toggleLock('${id}')">🔒</button>
                            <button onclick="movePlayer('${id}', ${teamIdx}, ${teamIdx === 0 ? 1 : 0})">${arrow}</button>
                        </div>
                    </div>
                `;
                if(colorName === 'azul') defensaContainer.insertAdjacentHTML('afterbegin', extraHTML);
                else defensaContainer.insertAdjacentHTML('beforeend', extraHTML);
            });
        }
    }

    function renderMultiTeams() {
        const container = document.getElementById('multi-view');
        container.innerHTML = '';

        currentTeams.forEach((team, teamIdx) => {
            const card = document.createElement('div');
            card.className = `team-card t-${teamIdx}`;
            card.innerHTML = `<h3>Equipo ${teamIdx + 1} (${team.length})</h3>`;

            const ul = document.createElement('div');
            team.forEach(id => {
                const p = players.find(player => player.id === id);
                if(!p) return;

                let moveOptions = '';
                for(let i=0; i<currentTeams.length; i++) {
                    if(i !== teamIdx) moveOptions += `<option value="${i}">Mover a E${i+1}</option>`;
                }

                const item = document.createElement('div');
                item.className = 'multi-player-row';
                item.innerHTML = `
                    <span>${p.name}</span>
                    <div style="display:flex; gap: 8px;">
                        <button class="${lockedPlayers.has(id) ? 'active-lock' : ''}" onclick="toggleLock('${id}')">🔒</button>
                        <select onchange="movePlayer('${id}', ${teamIdx}, parseInt(this.value))">
                            <option value="" disabled selected>🔄</option>
                            ${moveOptions}
                        </select>
                    </div>
                `;
                ul.appendChild(item);
            });
            card.appendChild(ul);
            container.appendChild(card);
        });
    }

    renderPlayerList();
</script>
</body>
</html>
